name: Release Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build Windows executable
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name PythonOilGUI
          --paths src
          src/oil_tracker/gui.py

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/PythonOilGUI.exe release/PythonOilGUI.exe
          Set-Content -Path release/README-Windows.txt -Value @'
          Python Oil Tracker for Windows

          1. Put PythonOilGUI.exe in any folder you like.
          2. Launch it by double-clicking the file.
          3. The app stores its SQLite database in .\data\oil_prices.db next to the executable.
          '@
          Compress-Archive -Path release/* -DestinationPath PythonOilGUI-windows-x64.zip -Force

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/PythonOilGUI.exe
            PythonOilGUI-windows-x64.zip
            release/README-Windows.txt
